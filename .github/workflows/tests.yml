name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest]
        php: [8.3, 8.4]
        laravel: [13.*]
        stability: [prefer-stable]

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath
          coverage: none

      - name: Install dependencies
        env:
          # COMPOSER_AUTH is a JSON blob giving Composer credentials for
          # the private laxa.app Satis repo. Configure it as a repository
          # secret in GitHub Actions settings. Format:
          #   {"http-basic": {"laxa.app": {"username": "...", "password": "..."}}}
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: Execute tests
        env:
          COMPOSER_AUTH: ${{ secrets.COMPOSER_AUTH }}
        run: vendor/bin/pest --compact
